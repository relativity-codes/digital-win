name: Unified Zappa Deployment

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 1. BUILD FRONTEND ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
      
      - name: Prepare Static Directory
        run: |
          mkdir -p backend/static
          cp -r frontend/out/* backend/static/

      # --- 2. SET UP BACKEND & ZAPPA ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Inject ALL Secrets into Zappa Settings
        run: |
          sudo apt-get install jq -y
          # Map TF_VAR_* secrets to Zappa environment variables
          SETTINGS="backend/zappa_settings.json"
          
          jq '.dev.environment_variables.OPENAI_API_KEY = "${{ secrets.TF_VAR_OPENAI_API_KEY }}"' $SETTINGS > tmp.json && mv tmp.json $SETTINGS
          jq '.dev.environment_variables.OPENAI_BASE_URL = "${{ secrets.TF_VAR_OPENAI_BASE_URL }}"' $SETTINGS > tmp.json && mv tmp.json $SETTINGS
          jq '.dev.environment_variables.REDIS_HOST = "${{ secrets.TF_VAR_REDIS_HOST }}"' $SETTINGS > tmp.json && mv tmp.json $SETTINGS
          jq '.dev.environment_variables.REDIS_PORT = "${{ secrets.TF_VAR_REDIS_PORT }}"' $SETTINGS > tmp.json && mv tmp.json $SETTINGS
          jq '.dev.environment_variables.REDIS_DB = "${{ secrets.TF_VAR_REDIS_DB }}"' $SETTINGS > tmp.json && mv tmp.json $SETTINGS
          jq '.dev.environment_variables.REDIS_USER = "${{ secrets.TF_VAR_REDIS_USER }}"' $SETTINGS > tmp.json && mv tmp.json $SETTINGS
          jq '.dev.environment_variables.REDIS_PASSWORD = "${{ secrets.TF_VAR_REDIS_PASSWORD }}"' $SETTINGS > tmp.json && mv tmp.json $SETTINGS

      - name: Install dependencies & Zappa Deploy
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install zappa mangum
          pip install -r requirements.txt
          zappa update dev || zappa deploy dev || (zappa tail dev --since 10m --disable-keep-open && exit 1)
